# TCD Default Configuration
# Temporal Concept Discovery for 1D time-series vibration data

model:
  path: "./cnn1d_model_new.ckpt"
  name: "./cnn1d_wide"

data:
  path: "./data"
  num_channels: 3  # X, Y, Z accelerometer axes
  seq_length: 2000  # timesteps
  sample_rate: 400  # Hz (5 seconds of data)
  class_names: ["OK", "NOK"]

analysis:
  layers: ["conv1", "conv2", "conv3", "conv4"]  # Conv layer names for CRP (flat attributes)
  composite: "cnc_validated"  # LRP composite rule validated on CNC vibration data
  concept_extraction_composite: "cnc_validated"  # Composite for concept extraction (Option A: use "epsilon_plus_flat" for all-positive relevance)
  use_signed_relevance: false  # If true, preserve sign in relevance (Option B: handle positive/negative contributions separately)
  batch_size: 4  # Small batch for CRP memory constraints (full backward graph required)
  use_class_weights: false  # Apply inverse-frequency class weights to concept relevances

tcd:
  variant: "C"  # PRIMARY: C (CRP-native concepts), A (filterbank/window), B (temporal), D (vibration features)
  primary_layer: "conv3"  # Layer to use for concept discovery (conv3 has 64 filters) -- changed to conv4 for more direct output impact, but conv3 may yield richer concepts
  n_concepts: 6  # Number of concepts for window-based discovery (Variant A)
  
  # Variant C: GMM prototypes in CRP space (PRIMARY METHOD)
  n_prototypes: 3  # Number of prototypes per class (or use use_bic_selection)
  use_bic_selection: false  # If true, use BIC to select optimal n_prototypes
  bic_range: [1, 2, 3, 4]  # Range to search for optimal n_prototypes
  top_k_samples: 6  # Top-k samples per prototype for visualization
  gmm_covariance: "diag"  # Better for high-dimensional (64+ dims): 'diag', 'full', 'tied', 'spherical'
  gmm_n_init: 5  # Number of GMM initializations (increased from 1 for better convergence)
  gmm_max_iter: 200  # Maximum GMM iterations (increased from 10 for 64-dim convergence)
  balance_method: none  # Method for handling class imbalance: 'downsample' (default) or 'oversample'
  
  # Global window analysis (for interpretation)
  global_windows:
    window_size: 40  # timesteps per window (0.1s at 400Hz)
    n_top_positions: 10  # Select top-10 window positions globally (None = use threshold)
    threshold_factor: 1.5  # For threshold mode: keep windows with importance > mean + factor*std
    per_class: true  # Find important windows per class
    use_signed_relevance: false  # If true, use mean signed relevance instead of absolute (for signed composites)
  
  # Important windows extraction (CNC-style per-sample analysis)
  important_windows:
    enabled: false  # Set to true to enable per-sample window analysis (disabled by default for Variant C)
    method: "per_sample"  # "per_sample" (CNC-style) or "global" (old averaging)
    n_top_windows: 10  # Top windows per sample
    window_size: 40  # Timesteps per window
    features:  # Features to extract per window
      - rms
      - peak_freq
      - crest_factor
      - kurtosis
      - zero_crossing_rate
      - spectral_energy
      - spectral_centroid
      - skewness
      - max_amplitude
      - avg_amplitude
  
  # Interpretation features (applied to globally-important windows)
  interpretation_features:
    - rms
    - crest_factor
    - kurtosis
    - skewness
    - peak_freq
    - spectral_energy
    - zero_crossing_rate
    - envelope_rms
    - inter_axis_corr
    - band_energy_ratio
    - spectral_flatness
  
  # Variant A (legacy): Frequency bands in Hz (physics-informed for fault detection)
  filterbank_bands: 
    - [0, 10]     # Normal operation signatures
    - [10, 50]    # Transition band
    - [50, 100]   # Mid-frequency
    - [100, 200]  # Fault signatures (~150Hz)
  
  # Variant B: Temporal descriptor concepts
  descriptor_types:
    - slope
    - peak
    - autocorr
    - spectral
  
  # Variant A (new): Window-based concept discovery (data-driven)
  window_concept:
    window_size: 40       # timesteps per window (0.1s at 400Hz)
    n_top_windows: null   # null = use adaptive threshold, or specify number
    threshold_factor: 1.0  # For adaptive mode: keep windows with relevance > mean + 1.0*std
    use_raw_signal: false  # Extract features from raw signal at important positions
    features: null        # null = use ALL available features (maximally automated)
    # Available features (leave null to use all):
    #   Time-domain: rms, mean_amplitude, std_amplitude, max_amplitude, crest_factor, 
    #                kurtosis, skewness, zero_crossing_rate
    #   Frequency-domain: peak_freq, spectral_energy, spectral_centroid, 
    #                     spectral_flatness, phase_std
    #   Vibration-specific: envelope_rms, envelope_peak, band_energy_ratio, 
    #                       harmonic_noise_ratio, inter_axis_corr
    gmm_covariance: "full"   # GMM covariance type
    gmm_n_init: 10           # GMM initializations
    gmm_max_iter: 100        # GMM max iterations
  
  # Variant D: Vibration features (for interpretation, not concept definition)
  vibration_features:
    window_size: 100         # Window size for feature extraction
    n_concepts: 30           # Number of top features to select (null = use all)
    use_feature_selection: true
    selection_method: "mutual_info"  # 'mutual_info' or 'fisher'
    n_prototypes: 4
    gmm_covariance: "diag"
    gmm_n_init: 5
    gmm_max_iter: 200

intervention:
  method: "suppress"  # suppress, amplify, or ablate
  target_layer: "conv3"  # Use conv3 (64 filters) for richer concept space, or conv4 (128 filters) for more direct output impact
  concept_indices: []  # leave empty to auto-select

evaluation:
  prototype_intervention: true  # Enable multi-filter prototype intervention
  prototype_top_k: 5  # Number of top filters to suppress per prototype
  concept_heatmaps: true  # Generate conditional CRP heatmaps
  concept_heatmap_top_k: 5  # Number of top concepts to visualize
  robustness_analysis: false  # Enable deviation-based robustness analysis
  deviation_threshold: 2.0  # Flag samples with ||Δ|| > mean + threshold*std
  incremental_faithfulness:
    enabled: true  # Compute PCX-style incremental faithfulness with AUC
    n_samples: 100  # Number of samples per class for the AUC measurement
    n_steps: 30  # Number of incremental suppression steps

robustness:
  n_samples: 100          # Number of samples to test
  noise_levels: [0.01, 0.05, 0.1, 0.2]  # Gaussian noise std as fraction of signal std
  shift_amounts: [10, 25, 50]  # Circular shift amounts in timesteps
  test_channel_dropout: true   # Test zeroing out individual channels

output:
  results_dir: "results"
  plots_dir: "plots"
  save_heatmaps: true
  save_features: true


