# TCD Default Configuration
# Temporal Concept Discovery for 1D time-series vibration data

model:
  path: "./cnn1d_model_final.ckpt"
  name: "./cnn1d_wide"

data:
  path: "./data"
  num_channels: 3  # X, Y, Z accelerometer axes
  seq_length: 2000  # timesteps
  sample_rate: 400  # Hz (5 seconds of data)
  class_names: ["OK", "NOK"]

analysis:
  layers: ["conv1", "conv2", "conv3", "conv4"]  # Conv layer names for CRP (flat attributes)
  composite: "cnc_validated"  # LRP composite rule validated on CNC vibration data
  batch_size: 4  # Small batch for CRP memory constraints (full backward graph required)
  use_class_weights: true  # Apply inverse-frequency class weights to concept relevances

tcd:
  variant: "A"  # A: filterbank/window-based, B: temporal_descriptors, C: learned_clusters, D: vibration_features
  n_concepts: 6  # Number of concepts for window-based discovery
  # Variant A (legacy): Frequency bands in Hz (physics-informed for fault detection)
  filterbank_bands: 
    - [0, 10]     # Normal operation signatures
    - [10, 50]    # Transition band
    - [50, 100]   # Mid-frequency
    - [100, 200]  # Fault signatures (~150Hz)
  # Variant A (new): Window-based concept discovery (data-driven)
  window_concept:
    window_size: 40       # timesteps per window (0.1s at 400Hz)
    n_top_windows: 20     # top windows to extract per sample
    features:             # features to extract per window
      - rms
      - peak_freq
      - crest_factor
      - kurtosis
      - zero_crossing_rate
      - spectral_energy
      - spectral_centroid
      - mean_amplitude
      - std_amplitude
      - max_amplitude
    gmm_covariance: "full"   # GMM covariance type
    gmm_n_init: 10           # GMM initializations
    gmm_max_iter: 100        # GMM max iterations
  # Variant C: GMM prototypes
  n_prototypes: 4
  top_k_samples: 6
  gmm_covariance: "full"
  gmm_n_init: 1
  gmm_max_iter: 10
  # Variant D: Vibration features
  vibration_features:
    window_size: 100         # Window size for feature extraction
    n_concepts: 30           # Number of top features to select (null = use all)
    use_feature_selection: true
    selection_method: "mutual_info"  # 'mutual_info' or 'fisher'
    n_prototypes: 4
    gmm_covariance: "full"
    gmm_n_init: 10
    gmm_max_iter: 100

intervention:
  method: "suppress"  # suppress, amplify, or ablate
  target_layer: "conv3"  # Use conv3 (64 filters) for richer concept space
  concept_indices: []  # leave empty to auto-select

output:
  results_dir: "results"
  plots_dir: "plots"
  save_heatmaps: true
  save_features: true


